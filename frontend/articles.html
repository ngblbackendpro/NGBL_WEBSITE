<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <!-- Character Encoding & Viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <!-- Favicon Links - Multiple Formats for Cross-Platform Support -->
    <link rel="icon" type="image/png" sizes="32x32" href="img/ngblfav.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/ngblfav.png">
    <link rel="shortcut icon" type="image/png" href="img/ngblfav.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/ngblfav.png">
    <link rel="apple-touch-icon" sizes="152x152" href="img/ngblfav.png">
    <link rel="icon" type="image/png" sizes="192x192" href="img/ngblfav.png">
    <meta name="msapplication-TileColor" content="#8B5CF6">
    <meta name="msapplication-TileImage" content="img/ngblfav.png">

    <!-- Theme Color Meta Tags -->
    <meta name="theme-color" content="#8B5CF6">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f5f5f5" media="(prefers-color-scheme: light)">
    <meta name="color-scheme" content="light dark">

    <!-- Cache Control for Social Media Crawlers -->
    <meta http-equiv="Cache-Control" content="public, max-age=3600">
    <meta http-equiv="Pragma" content="public">

    <!-- SEO Meta Tags -->
    <title>Articles & Blogs - NGBL | Latest Insights and Trends</title>
    <meta name="description" content="Explore expert articles and blogs on brand strategy, digital marketing, SEO, and business growth from NG BrandLab professionals.">
    <meta name="keywords" content="brand strategy articles, digital marketing blogs, SEO tips, business growth insights, content marketing, social media">
    <meta name="author" content="NG BrandLab">
    <meta name="robots" content="index, follow">

    <!-- Open Graph Tags - Optimized for Sharing -->
    <meta property="og:title" content="Articles & Blogs - NGBL | Expert Insights">
    <meta property="og:site_name" content="NG BrandLab">
    <meta property="og:description" content="Explore expert articles and blogs on brand strategy, digital marketing, SEO, and business growth from NG BrandLab professionals.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ngbl.com/articles.html">
    <meta property="og:image" content="https://ngbl.com/img/og-image.jpg">
    <meta property="og:image:secure_url" content="https://ngbl.com/img/og-image.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="NG BrandLab - Expert Articles & Blogs on Marketing">
    <meta property="og:locale" content="en_IN">

    <!-- Twitter Card Tags - Enhanced -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@ngbl">
    <meta name="twitter:creator" content="@ngbl">
    <meta name="twitter:title" content="Articles & Blogs - NGBL">
    <meta name="twitter:description" content="Explore expert articles and blogs from NG BrandLab on brand strategy and digital marketing.">
    <meta name="twitter:image" content="https://ngbl.com/img/og-image.jpg">
    <meta name="twitter:domain" content="ngbl.com">
    <meta name="twitter:image:alt" content="NG BrandLab Articles">

    <!-- Web App Manifest -->
    <link rel="manifest" href="site.webmanifest">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css" media="screen">
    <link rel="stylesheet" href="css/article.css" media="screen">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer"
    />
    <link rel="canonical" href="https://ngbl.com/articles.html">

    <!-- JSON-LD Schema Markup -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "CollectionPage",
        "name": "Articles & Blogs - NGBL",
        "url": "https://ngbl.com/articles.html",
        "description": "Expert articles and blogs on brand strategy, digital marketing, and business growth",
        "publisher": {
            "@type": "Organization",
            "name": "NG BrandLab",
            "logo": "https://ngbl.com/img/NGBL_Logo-removebg-preview.png"
        }
    }
    </script>
</head>

<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Header start -->
    <div id="header-container"></div>
    <!-- Header end -->
<a href="https://wa.me/919810119009" class="whatsapp-button" target="_blank" rel="noopener noreferrer" aria-label="Chat with us on WhatsApp" title="Chat with us on WhatsApp">
        <i class="fab fa-whatsapp" aria-hidden="true"></i>
    </a>

    <main id="main-content" role="main">
        <!-- Articles & Blogs Section -->
        <section class="blog-section articles-page" role="region" aria-label="All Articles and Blogs">
            <div class="blog-container">
                <div class="section-header">
                    <h1 class="section-title">Articles & Blogs</h1>
                    <div class="title-underline"></div>
                    <p class="section-subtitle">Discover comprehensive insights, expert tips, and the latest trends in branding, marketing, and business growth</p>
                </div>

                <div class="blog-grid blog-grid-full" id="articlesContainer">
                         <!-- Blogs will load dynamically here -->
                </div>

            </div>
        </section>

        <!-- Blog Modal -->
        <div class="blog-modal" id="blogModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="blog-modal-overlay"></div>
            <div class="blog-modal-content">
                <button class="blog-modal-close" aria-label="Close modal">
                    <i class="fas fa-times"></i>
                </button>
                <div class="blog-modal-body">
                    <img src="" alt="" class="blog-modal-image" id="modalImage">
                    <div class="blog-modal-details">
                        <div class="blog-modal-meta">
                            <span class="blog-modal-date" id="modalDate"></span>
                            <span class="blog-modal-category" id="modalCategory"></span>
                        </div>
                        <h2 class="blog-modal-title" id="modalTitle"></h2>
                        <div class="blog-modal-text" id="modalContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- footer starts -->
    <div id="footer-container"></div>
    <!-- footer ends -->

    <!-- Main JavaScript Files (Optimized Load Order) -->
    <script src="js/layout.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js" defer></script>
    <script src="js/Script.js" defer></script>
    <script src="js/article.js" defer></script>
</body>

</html>
