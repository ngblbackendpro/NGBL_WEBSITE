<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Section - Admin Panel</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>🎛️ Admin Panel</h2>
                <button class="toggle-sidebar">☰</button>
            </div>

            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
                <a href="home-management.html" class="nav-item">🏠 Home Management</a>
                <a href="work-section.html" class="nav-item active">🖼️ Work Section</a>
                <a href="brands.html" class="nav-item">🏷️ Brands</a>
                <a href="reviews.html" class="nav-item">⭐ Reviews</a>
                <a href="blogs.html" class="nav-item">📝 Blogs</a>
                <a href="team.html" class="nav-item">👥 Team Members</a>
                <a href="services.html" class="nav-item">🛠️ Services</a>
                <a href="projects.html" class="nav-item">📁 Projects</a>
                <a href="index.html" class="nav-item logout">🚪 Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="header-left">
                    <h1>Work Section Management</h1>
                </div>
                <div class="header-right">
                    <span id="currentDate" class="current-date"></span>
                </div>
            </header>

            <section class="dashboard-content">
                <p class="subtitle">🖼️ Admins can add or delete project photos and titles</p>

                <!-- Add Work -->
<div class="form-section">
                    <h2>➕ Add New Work</h2>
                    <form id="addWorkForm" class="form-group">
                        <div class="form-row">
                            <input type="text" id="workTitle" placeholder="Project Title" required>
                            <input type="text" id="workCategory" placeholder="Category" required>
                        </div>
                        <textarea id="workDescription" placeholder="Project Description" rows="4" required></textarea>
                        <input type="url" id="workLink" placeholder="Project Link (optional)">
                        <div id="workImagePreview" style="display: none; margin: 15px 0;">
                            <label style="display: block; margin-bottom: 10px; font-weight: bold;">🖼️ Image Preview:</label>
                            <img id="workPreviewImg" style="max-width: 300px; max-height: 300px; border: 2px solid #ddd; border-radius: 8px;" alt="Preview">
                            <button type="button" id="workUploadBtn" class="btn" style="margin-top: 10px;">✔ Upload Image</button>
                            <button type="button" id="workCancelBtn" class="btn" style="margin-top: 10px; background-color: #dc3545;">✕ Cancel</button>
                        </div>
                        <label class="file-input-label" id="workFileLabel">
                            📤 Select Image
                            <input type="file" id="workImage" accept="image/*" required>
                        </label>
                        <button type="submit" class="btn">✔ Add Work</button>
                    </form>
                </div>
                <!-- Works List -->
                <div class="form-section">
                    <h2>📋 Current Works</h2>
                    <div id="worksList" class="items-container">
                        <p class="empty-message">No works added yet. Add your first work above!</p>
                    </div>
                </div>
            </section>
        </main>
    </div>



    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/work-section.js"></script>
</body>
</html>
